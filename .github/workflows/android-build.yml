name: Android APK (CI)

# Builds an installable *release* APK on the GitHub runner via Gradle (no EAS
# servers — this spends GitHub Actions minutes, not EAS build credits) and
# publishes it to a rolling "ci-latest" GitHub Release so it can be downloaded
# straight to a phone as a raw .apk (Actions artifacts only download as a .zip).
#
# Release is signed with the debug keystore the Expo template wires into the
# release build type, so it installs without any secrets. The manual EAS Build
# workflow (eas-build.yml) is kept separate for cloud builds.

on:
  push:
    branches: [master]
    # Docs-only pushes don't change the APK, so don't spend a full build on them.
    paths-ignore:
      - '**.md'

# Needed so the workflow's GITHUB_TOKEN can create/update the GitHub Release.
permissions:
  contents: write

# A newer push to master supersedes an in-progress build.
concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --prefer-offline reuses the npm cache; --no-audit/--no-fund skip
        # network/metadata work that's pointless in CI.
        run: npm ci --prefer-offline --no-audit --no-fund

      # Managed project: generate the native android/ project from app.json.
      # --no-install skips a redundant dependency install (done by npm ci above).
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Caches ~/.gradle — downloaded dependencies AND the local build cache
      # (~/.gradle/caches/build-cache-1) — with proper save-on-every-run
      # semantics and restore-key fallback. Combined with --build-cache below
      # this lets Gradle reuse unchanged task outputs (Kotlin/Java/resource
      # compilation from the RN + Expo modules) across builds. Replaces
      # setup-java's `cache: gradle`, which only cached dependencies and, with a
      # key that never changed, never updated the build cache after run #1.
      - name: Set up Gradle caching
        uses: gradle/actions/setup-gradle@v4

      # Installs ccache and persists ~/.ccache in the GitHub Actions cache (the
      # per-repo 10 GB pool, same place as the Gradle cache above). ccache caches
      # native C/C++ object files by source-content hash, which is the one big
      # cost the Gradle build cache can't touch — the NDK compiles for
      # react-native-reanimated/worklets/gesture-handler/expo-modules-core and
      # :app. The CMAKE_*_COMPILER_LAUNCHER env vars on the build step below tell
      # every module's CMake build to route its compiler through ccache.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: android-arm64
          max-size: 500M

      # Give every CI build a unique, increasing versionCode (the workflow run
      # number) so a new APK installs as an in-place update over the previous CI
      # build instead of being rejected with "package version matches installed
      # package version". app.json pins no android.versionCode, so prebuild would
      # otherwise emit versionCode 1 every time. Done AFTER the Gradle caching
      # setup on purpose: the run number changes every build, so editing
      # build.gradle earlier would perturb the cache key the restore is computed
      # from.
      - name: Set versionCode to the run number
        run: |
          sed -i -E "s/versionCode [0-9]+/versionCode ${{ github.run_number }}/" android/app/build.gradle
          grep -nE "versionCode ${{ github.run_number }}([^0-9]|$)" android/app/build.gradle

      # Release build: shrunk + stripped + self-contained (embeds the JS bundle),
      # so it actually runs standalone. Signed with the template's debug keystore.
      #
      # reactNativeArchitectures=arm64-v8a builds only the 64-bit ARM ABI instead
      # of the default four (armeabi-v7a, arm64-v8a, x86, x86_64). Every modern
      # Android phone is arm64-v8a, so this skips ~3/4 of the native (NDK)
      # compilation — much faster build and a smaller APK. Trade-off: the APK
      # won't install on x86/x86_64 emulators.
      - name: Build release APK
        working-directory: android
        # CMake initializes each module's compiler launcher from these env vars
        # the first time its build tree is configured, so every native (NDK)
        # module compiles through ccache. CCACHE_SLOPPINESS lets time/date macros
        # in sources still hit the cache.
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          CCACHE_SLOPPINESS: time_macros,include_file_mtime,include_file_ctime
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --build-cache -PreactNativeArchitectures=arm64-v8a

      # Publish to a rolling prerelease so the download URL is stable:
      # https://github.com/<owner>/<repo>/releases/download/ci-latest/app-release.apk
      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-latest
          name: Latest CI build
          prerelease: true
          files: android/app/build/outputs/apk/release/app-release.apk
          body: |
            Automated debug-signed release APK from the latest push to master.
            Commit: ${{ github.sha }}
